# Render Blueprint — one-click deploy from GitHub
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: axion-technologies
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ADMIN_KEY
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
    disk:
      name: axion-data
      mountPath: /app/data
      sizeGB: 1
